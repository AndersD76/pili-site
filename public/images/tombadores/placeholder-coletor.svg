<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="50%" stop-color="#1C1810"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2A2A2A" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#grid)" opacity="0.3"/>

  <!-- Ground line -->
  <line x1="0" y1="480" x2="800" y2="480" stroke="#3D3D3D" stroke-width="2"/>

  <!-- Sampling probe structure -->
  <g>
    <!-- Vertical mast -->
    <rect x="385" y="140" width="30" height="340" rx="4" fill="#2A2A2A" stroke="#3D3D3D" stroke-width="1.5"/>

    <!-- Probe arm -->
    <rect x="280" y="200" width="240" height="8" rx="2" fill="#3D3D3D" stroke="#6B6B6B" stroke-width="1"/>

    <!-- Probe tip (sampling point) -->
    <line x1="400" y1="208" x2="400" y2="420" stroke="#6B6B6B" stroke-width="3"/>
    <polygon points="392,420 408,420 400,445" fill="#E31E24" opacity="0.7"/>

    <!-- Collection container -->
    <rect x="340" y="460" width="120" height="20" rx="4" fill="#3D3D3D" stroke="#E31E24" stroke-width="1"/>

    <!-- Sampling depth indicators -->
    <g opacity="0.3" stroke="#E31E24" stroke-width="1" stroke-dasharray="4,4">
      <line x1="420" y1="260" x2="460" y2="260"/>
      <line x1="420" y1="320" x2="460" y2="320"/>
      <line x1="420" y1="380" x2="460" y2="380"/>
    </g>
    <g font-family="monospace" font-size="8" fill="#E31E24" opacity="0.4">
      <text x="465" y="263">0.5m</text>
      <text x="465" y="323">1.5m</text>
      <text x="465" y="383">2.5m</text>
    </g>
  </g>

  <!-- Truck cargo area outline -->
  <g opacity="0.2" fill="none" stroke="#6B6B6B" stroke-width="1.5">
    <rect x="180" y="340" width="440" height="130" rx="4"/>
    <!-- Grain fill pattern -->
    <path d="M 200 380 Q 300 360 400 375 Q 500 390 600 370" stroke="#6B6B6B" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Red accent -->
  <rect x="0" y="0" width="800" height="3" fill="#E31E24"/>

  <!-- Labels -->
  <text x="400" y="110" text-anchor="middle" font-family="monospace" font-size="11" letter-spacing="6" fill="#6B6B6B" opacity="0.5">COLETOR DE AMOSTRAS</text>
  <text x="400" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" letter-spacing="8" fill="#3D3D3D">PILI INDUSTRIAL</text>

  <!-- Badge -->
  <rect x="20" y="20" width="90" height="24" rx="2" fill="#E31E24" opacity="0.15" stroke="#E31E24" stroke-width="0.5"/>
  <text x="65" y="36" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" letter-spacing="2" fill="#E31E24" opacity="0.7">COLETOR</text>
</svg>