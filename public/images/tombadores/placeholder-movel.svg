<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0F0F0F"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2A2A2A" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#grid)" opacity="0.4"/>

  <!-- Ground line -->
  <line x1="0" y1="480" x2="800" y2="480" stroke="#3D3D3D" stroke-width="2"/>

  <!-- Mobile base with wheels/skids -->
  <rect x="110" y="470" width="580" height="10" rx="2" fill="#2A2A2A" stroke="#3D3D3D" stroke-width="1"/>
  <!-- Skid rails -->
  <rect x="130" y="478" width="120" height="6" rx="3" fill="#3D3D3D"/>
  <rect x="550" y="478" width="120" height="6" rx="3" fill="#3D3D3D"/>

  <!-- Platform -->
  <rect x="110" y="432" width="580" height="14" rx="2" fill="#3D3D3D" stroke="#E31E24" stroke-width="1.5"/>

  <!-- Tilted platform (ghost) -->
  <g opacity="0.2" transform="rotate(-25, 110, 446)">
    <rect x="110" y="432" width="580" height="14" rx="2" fill="none" stroke="#E31E24" stroke-width="1.5" stroke-dasharray="8,4"/>
  </g>

  <!-- Hydraulic cylinders -->
  <g stroke="#6B6B6B" stroke-width="3">
    <line x1="260" y1="468" x2="240" y2="340"/>
    <line x1="530" y1="468" x2="510" y2="340"/>
  </g>
  <rect x="233" y="328" width="14" height="40" rx="3" fill="#3D3D3D" stroke="#6B6B6B" stroke-width="1.5"/>
  <rect x="503" y="328" width="14" height="40" rx="3" fill="#3D3D3D" stroke="#6B6B6B" stroke-width="1.5"/>

  <!-- Pivot points -->
  <circle cx="130" cy="440" r="7" fill="#E31E24" opacity="0.9"/>
  <circle cx="670" cy="440" r="7" fill="#E31E24" opacity="0.9"/>

  <!-- Truck silhouette -->
  <g opacity="0.25" fill="#6B6B6B">
    <rect x="180" y="384" width="400" height="44" rx="3"/>
    <rect x="540" y="364" width="56" height="64" rx="4"/>
    <circle cx="240" cy="430" r="11" fill="#2A2A2A" stroke="#6B6B6B" stroke-width="2"/>
    <circle cx="340" cy="430" r="11" fill="#2A2A2A" stroke="#6B6B6B" stroke-width="2"/>
    <circle cx="480" cy="430" r="11" fill="#2A2A2A" stroke="#6B6B6B" stroke-width="2"/>
    <circle cx="568" cy="430" r="11" fill="#2A2A2A" stroke="#6B6B6B" stroke-width="2"/>
  </g>

  <!-- Movement arrows (showing mobility) -->
  <g opacity="0.3" stroke="#E31E24" stroke-width="1.5" fill="none">
    <path d="M 60 500 L 30 500 L 40 492 M 30 500 L 40 508"/>
    <path d="M 740 500 L 770 500 L 760 492 M 770 500 L 760 508"/>
  </g>

  <!-- Red accent -->
  <rect x="0" y="0" width="800" height="3" fill="#E31E24"/>

  <!-- Labels -->
  <text x="400" y="130" text-anchor="middle" font-family="monospace" font-size="11" letter-spacing="6" fill="#6B6B6B" opacity="0.5">TOMBADOR MOVEL</text>
  <text x="400" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" letter-spacing="8" fill="#3D3D3D">PILI INDUSTRIAL</text>

  <!-- "MOVEL" badge -->
  <rect x="20" y="20" width="72" height="24" rx="2" fill="#E31E24" opacity="0.15" stroke="#E31E24" stroke-width="0.5"/>
  <text x="56" y="36" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" letter-spacing="2" fill="#E31E24" opacity="0.7">MOVEL</text>
</svg>