<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2A2A2A" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#grid)" opacity="0.4"/>

  <!-- Ground line -->
  <line x1="0" y1="480" x2="800" y2="480" stroke="#3D3D3D" stroke-width="2"/>

  <!-- Platform base (horizontal position) -->
  <rect x="120" y="440" width="560" height="12" rx="2" fill="#3D3D3D" stroke="#E31E24" stroke-width="1"/>

  <!-- Platform surface (tilted suggestion - ghost outline) -->
  <g opacity="0.25">
    <line x1="120" y1="440" x2="280" y2="220" stroke="#E31E24" stroke-width="2" stroke-dasharray="8,4"/>
    <rect x="120" y="218" width="560" height="12" rx="2" fill="none" stroke="#E31E24" stroke-width="1" transform="rotate(-22, 120, 440)" stroke-dasharray="6,3"/>
  </g>

  <!-- Hydraulic cylinders -->
  <g stroke="#6B6B6B" stroke-width="3" fill="none">
    <!-- Left cylinder -->
    <line x1="240" y1="478" x2="220" y2="360"/>
    <rect x="213" y="350" width="14" height="40" rx="3" fill="#3D3D3D" stroke="#6B6B6B" stroke-width="1.5"/>
    <!-- Right cylinder -->
    <line x1="540" y1="478" x2="520" y2="360"/>
    <rect x="513" y="350" width="14" height="40" rx="3" fill="#3D3D3D" stroke="#6B6B6B" stroke-width="1.5"/>
  </g>

  <!-- Pivot points -->
  <circle cx="140" cy="446" r="6" fill="#E31E24" opacity="0.8"/>
  <circle cx="660" cy="446" r="6" fill="#E31E24" opacity="0.8"/>

  <!-- Truck silhouette on platform -->
  <g opacity="0.3" fill="#6B6B6B">
    <!-- Truck body -->
    <rect x="200" y="390" width="380" height="45" rx="3"/>
    <!-- Truck cab -->
    <rect x="540" y="370" width="60" height="65" rx="4"/>
    <!-- Wheels -->
    <circle cx="260" cy="438" r="12" fill="#3D3D3D" stroke="#6B6B6B" stroke-width="2"/>
    <circle cx="340" cy="438" r="12" fill="#3D3D3D" stroke="#6B6B6B" stroke-width="2"/>
    <circle cx="500" cy="438" r="12" fill="#3D3D3D" stroke="#6B6B6B" stroke-width="2"/>
    <circle cx="570" cy="438" r="12" fill="#3D3D3D" stroke="#6B6B6B" stroke-width="2"/>
  </g>

  <!-- Red accent line at top -->
  <rect x="0" y="0" width="800" height="3" fill="#E31E24"/>

  <!-- PILI text watermark -->
  <text x="400" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" letter-spacing="8" fill="#3D3D3D" text-transform="uppercase">PILI INDUSTRIAL</text>

  <!-- Category label -->
  <text x="400" y="160" text-anchor="middle" font-family="monospace" font-size="11" letter-spacing="4" fill="#6B6B6B" opacity="0.6">TOMBADOR HIDRAULICO</text>
</svg>