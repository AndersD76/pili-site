<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2A2A2A" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#grid)" opacity="0.3"/>

  <!-- Ground line -->
  <line x1="0" y1="480" x2="800" y2="480" stroke="#3D3D3D" stroke-width="2"/>

  <!-- Hydraulic press / equipment silhouette -->
  <g>
    <!-- Frame -->
    <rect x="280" y="200" width="240" height="280" rx="4" fill="none" stroke="#3D3D3D" stroke-width="3"/>

    <!-- Top beam -->
    <rect x="280" y="200" width="240" height="20" rx="2" fill="#2A2A2A" stroke="#3D3D3D" stroke-width="1.5"/>

    <!-- Bottom base -->
    <rect x="260" y="460" width="280" height="20" rx="2" fill="#2A2A2A" stroke="#3D3D3D" stroke-width="1.5"/>

    <!-- Hydraulic ram -->
    <rect x="370" y="220" width="60" height="100" rx="4" fill="#3D3D3D" stroke="#6B6B6B" stroke-width="1.5"/>
    <line x1="400" y1="320" x2="400" y2="380" stroke="#E31E24" stroke-width="3" opacity="0.6"/>

    <!-- Press plate -->
    <rect x="320" y="375" width="160" height="12" rx="2" fill="#3D3D3D" stroke="#E31E24" stroke-width="1"/>

    <!-- Work area -->
    <rect x="320" y="400" width="160" height="56" rx="2" fill="none" stroke="#6B6B6B" stroke-width="1" stroke-dasharray="6,3" opacity="0.4"/>

    <!-- Side columns -->
    <rect x="283" y="220" width="16" height="240" fill="#2A2A2A"/>
    <rect x="501" y="220" width="16" height="240" fill="#2A2A2A"/>
  </g>

  <!-- Force arrows -->
  <g opacity="0.3" stroke="#E31E24" stroke-width="1.5">
    <line x1="400" y1="240" x2="400" y2="280"/>
    <polygon points="393,278 407,278 400,290" fill="#E31E24"/>
  </g>

  <!-- Red accent -->
  <rect x="0" y="0" width="800" height="3" fill="#E31E24"/>

  <!-- Labels -->
  <text x="400" y="130" text-anchor="middle" font-family="monospace" font-size="11" letter-spacing="6" fill="#6B6B6B" opacity="0.5">EQUIPAMENTO ESPECIAL</text>
  <text x="400" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" letter-spacing="8" fill="#3D3D3D">PILI INDUSTRIAL</text>

  <!-- Badge -->
  <rect x="20" y="20" width="90" height="24" rx="2" fill="#E31E24" opacity="0.15" stroke="#E31E24" stroke-width="0.5"/>
  <text x="65" y="36" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" letter-spacing="2" fill="#E31E24" opacity="0.7">ESPECIAL</text>
</svg>