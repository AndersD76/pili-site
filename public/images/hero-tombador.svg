<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none">
  <!-- Background -->
  <rect width="1920" height="1080" fill="#0A0A0A"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <linearGradient id="redGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E31E24" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E31E24" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="steelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3D3D3D"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="platformGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A4A4A"/>
      <stop offset="100%" stop-color="#2A2A2A"/>
    </linearGradient>
    <linearGradient id="cylGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6B6B6B"/>
      <stop offset="50%" stop-color="#9A9A9A"/>
      <stop offset="100%" stop-color="#6B6B6B"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#grid)"/>

  <!-- Red glow from bottom -->
  <rect x="0" y="600" width="1920" height="480" fill="url(#redGlow)"/>

  <!-- Ground / Foundation -->
  <rect x="0" y="820" width="1920" height="260" fill="#1A1A1A"/>
  <rect x="0" y="818" width="1920" height="4" fill="#2A2A2A"/>

  <!-- Concrete foundation block -->
  <rect x="750" y="760" width="500" height="62" rx="2" fill="#2A2A2A" stroke="#3D3D3D" stroke-width="1"/>
  <rect x="760" y="770" width="480" height="42" rx="1" fill="#252525"/>
  <!-- Foundation bolts -->
  <circle cx="790" cy="790" r="5" fill="#3D3D3D"/>
  <circle cx="830" cy="790" r="5" fill="#3D3D3D"/>
  <circle cx="1170" cy="790" r="5" fill="#3D3D3D"/>
  <circle cx="1210" cy="790" r="5" fill="#3D3D3D"/>

  <!-- Hydraulic pit -->
  <rect x="800" y="822" width="400" height="120" fill="#111111" stroke="#2A2A2A" stroke-width="1"/>

  <!-- TOMBADOR PLATFORM (tilted at ~35 degrees) -->
  <g transform="translate(1000, 760) rotate(-32)">
    <!-- Main platform beam -->
    <rect x="-520" y="-18" width="560" height="36" rx="3" fill="url(#platformGrad)" stroke="#4A4A4A" stroke-width="1.5"/>
    <!-- Platform surface (non-slip pattern) -->
    <rect x="-510" y="-16" width="540" height="8" fill="#3D3D3D"/>
    <!-- Cross beams -->
    <rect x="-480" y="-18" width="8" height="36" fill="#3D3D3D"/>
    <rect x="-380" y="-18" width="8" height="36" fill="#3D3D3D"/>
    <rect x="-280" y="-18" width="8" height="36" fill="#3D3D3D"/>
    <rect x="-180" y="-18" width="8" height="36" fill="#3D3D3D"/>
    <rect x="-80" y="-18" width="8" height="36" fill="#3D3D3D"/>
    <!-- Safety rails -->
    <rect x="-520" y="-28" width="560" height="3" fill="#E31E24"/>
    <rect x="-520" y="21" width="560" height="3" fill="#4A4A4A"/>
    <!-- Platform end stop -->
    <rect x="30" y="-40" width="12" height="80" rx="2" fill="#E31E24"/>
  </g>

  <!-- TRUCK on platform (tilted) -->
  <g transform="translate(1000, 760) rotate(-32)">
    <!-- Truck chassis -->
    <rect x="-460" y="-55" width="340" height="36" rx="3" fill="#2A2A2A" stroke="#3D3D3D" stroke-width="1"/>
    <!-- Truck cab -->
    <rect x="-460" y="-90" width="80" height="72" rx="4" fill="#3D3D3D" stroke="#4A4A4A" stroke-width="1"/>
    <rect x="-450" y="-82" width="30" height="25" rx="2" fill="#1A1A1A" opacity="0.8"/>
    <!-- Truck cargo bed (open, grain pouring) -->
    <rect x="-370" y="-85" width="250" height="66" rx="2" fill="#2A2A2A" stroke="#3D3D3D" stroke-width="1"/>
    <!-- Truck wheels -->
    <circle cx="-420" cy="-16" r="16" fill="#1A1A1A" stroke="#3D3D3D" stroke-width="2"/>
    <circle cx="-420" cy="-16" r="6" fill="#3D3D3D"/>
    <circle cx="-180" cy="-16" r="16" fill="#1A1A1A" stroke="#3D3D3D" stroke-width="2"/>
    <circle cx="-180" cy="-16" r="6" fill="#3D3D3D"/>
    <circle cx="-145" cy="-16" r="16" fill="#1A1A1A" stroke="#3D3D3D" stroke-width="2"/>
    <circle cx="-145" cy="-16" r="6" fill="#3D3D3D"/>
  </g>

  <!-- HYDRAULIC CYLINDERS -->
  <!-- Cylinder 1 -->
  <g>
    <rect x="920" y="580" width="22" height="180" rx="11" fill="url(#cylGrad)" transform="rotate(15, 931, 670)"/>
    <rect x="925" y="560" width="12" height="80" rx="6" fill="#9A9A9A" transform="rotate(15, 931, 600)"/>
    <!-- Piston rod shine -->
    <rect x="929" y="565" width="4" height="70" rx="2" fill="#D4D4D4" opacity="0.4" transform="rotate(15, 931, 600)"/>
  </g>
  <!-- Cylinder 2 -->
  <g>
    <rect x="1040" y="580" width="22" height="180" rx="11" fill="url(#cylGrad)" transform="rotate(10, 1051, 670)"/>
    <rect x="1045" y="560" width="12" height="80" rx="6" fill="#9A9A9A" transform="rotate(10, 1051, 600)"/>
    <rect x="1049" y="565" width="4" height="70" rx="2" fill="#D4D4D4" opacity="0.4" transform="rotate(10, 1051, 600)"/>
  </g>

  <!-- Hinge / pivot point -->
  <circle cx="1000" cy="760" r="18" fill="#3D3D3D" stroke="#4A4A4A" stroke-width="2"/>
  <circle cx="1000" cy="760" r="8" fill="#1A1A1A"/>
  <circle cx="1000" cy="760" r="3" fill="#E31E24"/>

  <!-- GRAIN falling from truck -->
  <g opacity="0.6">
    <circle cx="1120" cy="520" r="2" fill="#D4A853"/>
    <circle cx="1130" cy="540" r="2.5" fill="#C49B45"/>
    <circle cx="1115" cy="555" r="2" fill="#D4A853"/>
    <circle cx="1140" cy="530" r="1.5" fill="#B8903C"/>
    <circle cx="1125" cy="570" r="2" fill="#D4A853"/>
    <circle cx="1135" cy="590" r="2.5" fill="#C49B45"/>
    <circle cx="1145" cy="560" r="2" fill="#D4A853"/>
    <circle cx="1150" cy="610" r="3" fill="#B8903C"/>
    <circle cx="1128" cy="620" r="2" fill="#D4A853"/>
    <circle cx="1160" cy="640" r="2.5" fill="#C49B45"/>
    <circle cx="1140" cy="660" r="3" fill="#D4A853"/>
    <circle cx="1155" cy="680" r="2" fill="#B8903C"/>
    <circle cx="1165" cy="700" r="3.5" fill="#C49B45"/>
    <circle cx="1145" cy="720" r="2.5" fill="#D4A853"/>
    <circle cx="1170" cy="730" r="3" fill="#B8903C"/>
    <!-- Grain pile at bottom -->
    <ellipse cx="1160" cy="755" rx="50" ry="15" fill="#B8903C" opacity="0.8"/>
    <ellipse cx="1160" cy="752" rx="40" ry="10" fill="#C49B45" opacity="0.6"/>
  </g>

  <!-- SILO structure (background right) -->
  <g opacity="0.25">
    <rect x="1500" y="300" width="120" height="520" rx="60" fill="#2A2A2A" stroke="#3D3D3D" stroke-width="1"/>
    <rect x="1510" y="280" width="100" height="40" rx="4" fill="#2A2A2A"/>
    <rect x="1650" y="350" width="100" height="470" rx="50" fill="#2A2A2A" stroke="#3D3D3D" stroke-width="1"/>
    <rect x="1660" y="330" width="80" height="40" rx="4" fill="#2A2A2A"/>
    <!-- Conveyor -->
    <rect x="1440" y="310" width="180" height="8" fill="#3D3D3D" transform="rotate(-25, 1530, 314)"/>
  </g>

  <!-- SILO structure (background left) -->
  <g opacity="0.15">
    <rect x="200" y="400" width="100" height="420" rx="50" fill="#2A2A2A" stroke="#3D3D3D" stroke-width="1"/>
    <rect x="210" y="380" width="80" height="35" rx="4" fill="#2A2A2A"/>
    <rect x="330" y="350" width="110" height="470" rx="55" fill="#2A2A2A" stroke="#3D3D3D" stroke-width="1"/>
    <rect x="340" y="330" width="90" height="35" rx="4" fill="#2A2A2A"/>
  </g>

  <!-- PILI red accent line (left) -->
  <rect x="0" y="0" width="4" height="1080" fill="#E31E24"/>

  <!-- Technical labels (engineering style) -->
  <g font-family="monospace" font-size="11" fill="#3D3D3D" opacity="0.5">
    <text x="770" y="800">FUNDAÇÃO 1200mm</text>
    <text x="1080" y="500">42° INCLINAÇÃO</text>
    <text x="840" y="870">FOSSA HIDRÁULICA</text>
  </g>

  <!-- Dimension lines -->
  <g stroke="#3D3D3D" stroke-width="0.5" opacity="0.3">
    <!-- Horizontal dimension -->
    <line x1="580" y1="780" x2="1050" y2="780"/>
    <line x1="580" y1="775" x2="580" y2="785"/>
    <line x1="1050" y1="775" x2="1050" y2="785"/>
  </g>
  <text x="780" y="778" font-family="monospace" font-size="10" fill="#E31E24" opacity="0.4">30.000 mm</text>

  <!-- Subtle vignette -->
  <rect width="1920" height="1080" fill="url(#grid)" opacity="0.5"/>
  <rect x="0" y="0" width="1920" height="200" fill="url(#redGlow)" opacity="0.3" transform="rotate(180, 960, 100)"/>
</svg>
